<!DOCTYPE html>
<html>
<head>
<title>My Website</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* Menu */
nav {
    background: black;
    padding: 15px;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
}

/* Frame */
iframe {
    width: 100%;
    height: 90vh;
    border: none;
}
</style>

</head>

<body>

<!-- Menu -->
<nav>
    <a href="#" onclick="loadPage('home')">Home</a>
    <a href="#" onclick="loadPage('services')">Services</a>
    <a href="#" onclick="loadPage('about')">About</a>
    <a href="#" onclick="loadPage('contact')">Contact</a>
</nav>

<!-- Content Area -->
<iframe id="frame"></iframe>

<script>
function loadPage(page) {
    let content = "";

    if(page === "home") {
        content = "<h1>Home Page</h1><p>Welcome to my website</p>";
    }
    else if(page === "services") {
        content = "<h1>Services</h1><p>Web Development | App Development</p>";
    }
    else if(page === "about") {
        content = "<h1>About</h1><p>This is a simple website</p>";
    }
    else if(page === "contact") {
        content = "<h1>Contact</h1><p>Email: example@gmail.com</p>";
    }

    document.getElementById("frame").srcdoc = content;
}

/* Load home by default */
loadPage("home");
</script>

</body>
</html>
