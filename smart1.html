<!DOCTYPE html>
<html>
<head>
<title>SmartTech</title>

<style>
body { margin:0; font-family:Arial; }

/* Menu */
nav {
    background:black;
    padding:15px;
    text-align:center;
}
nav button {
    color:white;
    background:none;
    border:none;
    margin:15px;
    font-size:16px;
    cursor:pointer;
}

/* Pages */
.page {
    display:none;
    padding:50px;
    text-align:center;
}
.active {
    display:block;
}

/* Colors */
#home { background:lightblue; height:90vh; }
#services { background:lightgreen; height:90vh; }
#about { background:lightpink; height:90vh; }
#contact { background:lightgray; height:90vh; }
</style>

</head>

<body>

<!-- Menu -->
<nav>
    <button onclick="show('home')">Home</button>
    <button onclick="show('services')">Services</button>
    <button onclick="show('about')">About</button>
    <button onclick="show('contact')">Contact</button>
</nav>

<!-- Pages -->
<div id="home" class="page active">
    <h1>Welcome to SmartTech</h1>
    <p>We create websites and apps.</p>
</div>

<div id="services" class="page">
    <h1>Our Services</h1>
    <p>Web Development, App Development, UI Design</p>
</div>

<div id="about" class="page">
    <h1>About Us</h1>
    <p>We are a simple tech team building modern solutions.</p>
</div>

<div id="contact" class="page">
    <h1>Contact</h1>
    <p>Email: smarttech@gmail.com</p>
</div>

<script>
function show(id) {
    let pages = document.getElementsByClassName("page");
    for(let i=0;i<pages.length;i++){
        pages[i].style.display="none";
    }
    document.getElementById(id).style.display="block";
}
</script>

</body>
</html>
