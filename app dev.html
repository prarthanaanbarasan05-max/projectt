<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTech</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

/* Header */
header {
    background: #111;
    color: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav a {
    color: white;
    margin: 0 15px;
    cursor: pointer;
    text-decoration: none;
}

/* Sections */
.page {
    display: none;
    padding: 50px;
    text-align: center;
}

.active {
    display: block;
}

/* Hero */
.hero {
    height: 80vh;
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
</style>

</head>

<body>

<header>
    <h2>SmartTech</h2>
    <nav>
        <a href="#" onclick="showPage('home')">Home</a>
        <a href="#" onclick="showPage('services')">Services</a>
        <a href="#" onclick="showPage('about')">About</a>
        <a href="#" onclick="showPage('contact')">Contact</a>
    </nav>
</header>

<!-- HOME -->
<div id="home" class="page active hero">
    <h1>Welcome to SmartTech</h1>
    <p>This is Home Page</p>
</div>

<!-- SERVICES -->
<div id="services" class="page">
    <h1>Our Services</h1>
    <p>Web Development | App Development | UI/UX Design</p>
</div>

<!-- ABOUT -->
<div id="about" class="page">
    <h1>About Us</h1>
    <p>We build modern websites and applications.</p>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
    <h1>Contact</h1>
    <p>Email: smarttech@gmail.com</p>
</div>

<script>
function showPage(pageId) {
    let pages = document.querySelectorAll(".page");

    pages.forEach(function(page) {
        page.classList.remove("active");
    });

    document.getElementById(pageId).classList.add("active");
}
</script>

</body>
</html>
